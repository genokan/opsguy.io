name: Deploy

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        env:
          HUGO_VERSION: '0.155.3'
        run: |
          curl -Lo hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Build
        run: hugo --minify
        working-directory: ./site

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./site/public

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./public

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::636995629245:role/opsguy-io-github-actions
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync ./public s3://opsguy-io-ssg --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E36VEX311OXI76 --paths "/*"
